name: Integration test

on: [push]

env:
  PYTHONIOENCODING: "utf-8"

jobs:
  build:
    runs-on: t4_gpu
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run detection benchmark test
        run: |
          uv run python benchmark/detection.py --max_rows 2
          uv run python benchmark/utils/verify_benchmark_scores.py results/benchmark/det_bench/results.json --bench_type detection
      - name: Run recognition benchmark test
        run: |
          uv run python benchmark/recognition.py --max_rows 2
          uv run python benchmark/utils/verify_benchmark_scores.py results/benchmark/rec_bench/results.json --bench_type recognition
      - name: Run layout benchmark test
        run: |
          uv run python benchmark/layout.py --max_rows 5
          uv run python benchmark/utils/verify_benchmark_scores.py results/benchmark/layout_bench/results.json --bench_type layout
      - name: Run table recognition benchmark
        run: |
          uv run python benchmark/table_recognition.py --max_rows 5
          uv run python benchmark/utils/verify_benchmark_scores.py results/benchmark/table_rec_bench/results.json --bench_type table_recognition
